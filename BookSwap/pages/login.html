<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Electron Auth</title>
    <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
    <div class="container">
        <h1>Welcome Back</h1>

        <div class="form-group">
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group password-field">
            <input type="password" id="password" placeholder="Enter your password">
            <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('password', this)"></i>
        </div>

        <div class="forgot-link">
            <a onclick="handleForgotPassword()">Forgot Password?</a>
        </div>

        <button class="btn" onclick="handleLogin()">Sign In</button>

        <div class="links">
            <a onclick="handleSignUp()">Don't have an account? Sign Up</a>
        </div>
    </div>

    <script src="../renderer/login.js"></script>
    <script src="../renderer/shared.js"></script>
    <script>
// Force page reset on every load
window.onload = function() {
    // Reset all forms
    const forms = document.getElementsByTagName('form');
    for(let form of forms) {
        form.reset();
    }
    
    // Clear all inputs
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.value = '';
        input.disabled = false;
    });
    
    // Reset all buttons
    const buttons = document.querySelectorAll('.btn');
    buttons.forEach(btn => {
        btn.disabled = false;
        if(btn.id === 'sendOTPBtn') btn.textContent = 'Send OTP';
        else if(btn.textContent.includes('Sign In')) btn.textContent = 'Sign In';
        else if(btn.textContent.includes('Register')) btn.textContent = 'Register Now';
    });
    
    // Clear localStorage
    localStorage.clear();
};
    </script>
</body>

</html>
