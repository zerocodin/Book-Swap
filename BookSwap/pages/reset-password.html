<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Electron Auth</title>
    <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        
        <div class="form-group">
            <input type="text" id="otp" placeholder="Enter OTP sent to your email" maxlength="6">
        </div>

        <div class="form-group password-field">
            <input type="password" id="newPassword" placeholder="Enter new password">
            <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('newPassword', this)"></i>
        </div>

        <div class="form-group password-field">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
            <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
        </div>
        <div id="passwordError" class="error-message">Passwords do not match</div>

        <button class="btn" onclick="handleResetPassword()">Reset Password</button>

        <div class="links">
            <a onclick="handleBackToForgot()">Back to Forgot Password</a>
            <span style="color: white; margin: 0 5px;">|</span>
            <a onclick="handleBackToLogin()">Back to Login</a>
        </div>
    </div>

    <script src="../renderer/reset-password.js"></script>
    <script src="../renderer/shared.js"></script>
</body>
</html>
