<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Electron Auth</title>
    <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
    <div class="container">
        <h1>Fill Up Your Detail's</h1>

        <div class="form-group">
            <input type="text" id="fullname" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group password-field">
            <input type="password" id="password" placeholder="Enter your password">
            <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('password', this)"></i>
        </div>

        <div class="form-group password-field">
            <input type="password" id="confirmPassword" placeholder="Confirm your password">
            <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
        </div>
        <div id="passwordError" class="error-message">Passwords do not match</div>

        <button class="btn" onclick="handleRegister()">Register Now</button>

        <div class="links">
            <a onclick="handleSignIn()">Have an account already? Sign In</a>
        </div>
    </div>

    <script src="../renderer/register.js"></script>
    <script src="../renderer/shared.js"></script>
    <script>
        // Reset page state on load
        document.addEventListener('DOMContentLoaded', function () {
            // Clear all input fields
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.value = '';
                input.disabled = false;
            });

            // Reset register button
            const registerBtn = document.querySelector('.btn');
            if (registerBtn) {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register Now';
            }

            // Clear any stored error states
            const errorDiv = document.getElementById('passwordError');
            if (errorDiv) errorDiv.style.display = 'none';
        });

        // Also reset when page becomes visible
        document.addEventListener('visibilitychange', function () {
            if (!document.hidden) {
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    if (input.type !== 'hidden') {
                        input.value = '';
                        input.disabled = false;
                    }
                });

                const registerBtn = document.querySelector('.btn');
                if (registerBtn) {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Register Now';
                }

                const errorDiv = document.getElementById('passwordError');
                if (errorDiv) errorDiv.style.display = 'none';
            }
        });
    </script>
</body>

</html>
